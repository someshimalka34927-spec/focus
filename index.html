<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Premium Study Space - AL Science Squad</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-overlay: linear-gradient(135deg, rgba(10, 11, 18, 0.9) 0%, rgba(20, 24, 38, 0.95) 100%);
            --card-bg: rgba(22, 25, 41, 0.7);
            --accent-purple: #bd93f9;
            --accent-teal: #8be9fd;
            --accent-pink: #ff79c6;
            --text-main: #f8f8f2;
            --text-muted: #94a3b8;
            --btn-gradient: linear-gradient(90deg, #6272a4, #bd93f9);
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay);
            z-index: 0;
        }

        /* Logo Animation */
        .squad-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: block;
            box-shadow: 0 0 20px rgba(189, 147, 249, 0.6);
            border: 2px solid #ffcc00;
        }

        /* --- Simple Email Auth Screen --- */
        .auth-screen-container {
            position: relative;
            z-index: 2;
            background: rgba(18, 20, 32, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* --- Dashboard Container --- */
        .dashboard-container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 410px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            display: none;
        }

        h1 { font-size: 1.8em; font-weight: 800; margin-bottom: 4px; background: linear-gradient(to right, #8be9fd, #bd93f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0; }
        h2 { font-size: 1.6em; font-weight: 800; margin-bottom: 4px; background: linear-gradient(to right, #ff79c6, #bd93f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 5px; }
        .squad-tag { font-size: 0.95em; font-weight: bold; background: linear-gradient(to right, #ff79c6, #8be9fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }

        .tg-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: rgba(0,0,0,0.25); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { font-size: 1.4em; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.7em; color: #a4b5cf; text-transform: uppercase; }

        .mode-selectors { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .mode-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8em; }
        .mode-btn.active { background: rgba(189, 147, 249, 0.2); color: var(--accent-purple); border-color: var(--accent-purple); }

        .timer-display-box { margin-bottom: 20px; }
        .time-digits { font-size: 4.2em; font-weight: 700; color: #fff; }
        
        .main-action-btn { background: var(--btn-gradient); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; font-size: 0.95em; cursor: pointer; width: 100%; box-sizing: border-box; }

        .input-wrapper { display: flex; flex-direction: column; gap: 6px; text-align: left; margin-top: 20px; }
        .custom-input { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.35); color: white; font-size: 0.9em; outline: none; width: 100%; box-sizing: border-box; }

        .ai-response { background: rgba(139, 233, 253, 0.04); border-left: 3px solid var(--accent-teal); padding: 12px; border-radius: 0 12px 12px 0; text-align: left; margin-top: 15px; display: none; font-size: 0.85em; }
        .inline-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

        .history-box { margin-top: 20px; background: rgba(0, 0, 0, 0.3); border-radius: 14px; padding: 12px; border: 1px solid rgba(255,255,255,0.03); text-align: left; }
        .history-title { font-size: 0.85em; font-weight: bold; color: var(--accent-purple); margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .history-list { max-height: 100px; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .history-item { font-size: 0.8em; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; color: #e2e8f0; }

        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 12px; font-size: 0.8em; }
        .logout-btn { background: none; border: none; color: var(--accent-pink); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-screen-container" id="authScreen">
        <img src="photo_2026-06-02_10-22-04.jpg" class="squad-logo" alt="AL Science Squad Logo">
        <h2>Focus Space</h2>
        <div class="squad-tag">AL Science Squad 2028</div>
        
        <a href="https://t.me/AL2028Everything" target="_blank" class="tg-link-btn">✈️ Join Telegram Channel</a>
        
        <div style="text-align: left; margin-bottom: 20px;">
            <label style="font-size: 0.85em; color: #a4b5cf; margin-left: 2px;">Enter Email Address</label>
            <input type="email" id="authEmail" class="custom-input" placeholder="ඔබේ Email ලිපිනය..." style="margin-top: 6px;" onkeydown="checkEnterKey(event, 'auth')">
        </div>

        <button class="main-action-btn" onclick="executeCloudLogin()">Sign In / Enter Space</button>
    </div>


    <div class="dashboard-container" id="mainDashboard">
        <div class="dashboard-header">
            <span>⚡ User: <b style="color: var(--accent-teal);" id="userDisplayBadg">...</b></span>
            <button class="logout-btn" onclick="executeLogout()">Logout</button>
        </div>

        <img src="photo_2026-06-02_10-22-04.jpg" class="squad-logo" style="width: 70px; height: 70px;" alt="Logo">
        <h1>AI Premium Focus</h1>
        <div class="squad-tag">AL Science Squad 2028</div>

        <a href="https://t.me/AL2028Everything" target="_blank" class="tg-link-btn">✈️ Visit Telegram Squad</a>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="pointsDisplay">0</div>
                <div class="stat-label">✨ Total Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sessionsDisplay">0</div>
                <div class="stat-label">🔥 Sessions</div>
            </div>
        </div>

        <div class="mode-selectors">
            <button class="mode-btn active" id="focusModeBtn" onclick="setMode('focus')">Focus Session</button>
            <button class="mode-btn" id="breakModeBtn" onclick="setMode('break')">Short Break</button>
        </div>

        <div class="timer-display-box">
            <div class="time-digits" id="timer">25:00</div>
            <button class="main-action-btn" id="timerBtn" onclick="toggleTimer()" style="width: auto; padding: 12px 40px;">Start Session</button>
        </div>

        <div class="inline-inputs">
            <div>
                <label style="font-size:0.8em; color:#a4b5cf;">Focus (Min)</label>
                <input type="number" id="customFocus" class="custom-input" value="25" min="1" onchange="updateCustomTimes()" style="text-align:center;">
            </div>
            <div>
                <label style="font-size:0.8em; color:#a4b5cf;">Break (Min)</label>
                <input type="number" id="customBreak" class="custom-input" value="5" min="1" onchange="updateCustomTimes()" style="text-align:center;">
            </div>
        </div>

        <div class="input-wrapper">
            <label style="font-size:0.8em; color:#a4b5cf;">දැන් කරන්න යන වැඩ කොටස:</label>
            <input type="text" id="taskTopic" class="custom-input" placeholder="E.g., Physics Mechanics MCQ" onkeydown="checkEnterKey(event, 'task')">
            <button class="main-action-btn" onclick="askAIForPlan()" style="margin-top: 5px; background: #6272a4;">AI Smart Plan</button>
        </div>

        <div class="ai-response" id="aiOutput">
            <div style="font-weight: bold; color: var(--accent-teal); margin-bottom: 4px;">✨ AI Session Plan:</div>
            <div id="aiSteps"></div>
        </div>

        <div class="history-box">
            <div class="history-title">📊 Session History:</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        // 🔴 ඔයාගේ FIREBASE CONFIG விස්තර ටික මෙතනට පේස්ට් කරන්න 🔴
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let countdown, isRunning = false, currentMode = 'focus'; 
        let focusTime = 25 * 60, breakTime = 5 * 60, timeLeft = focusTime;
        let activeEmail = "";
        let userData = { points: 0, sessions: 0, history: [] };

        // Auto Login System
        window.onload = function() {
            let savedUser = localStorage.getItem('squad_cloud_user');
            if(savedUser) {
                activeEmail = savedUser;
                document.getElementById('userDisplayBadg').innerText = activeEmail;
                loadDataFromCloud(activeEmail);
            } else {
                showAuthScreen();
            }
        };

        function checkEnterKey(event, type) {
            if (event.key === "Enter") {
                event.preventDefault();
                if (type === 'auth') executeCloudLogin();
                if (type === 'task') askAIForPlan();
            }
        }

        // --- DIRECT EMAIL LOGIN ---
        function executeCloudLogin() {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            if(!email || !email.includes('@')) {
                return alert("කරුණාකර නිවැරදි Email ලිපිනයක් ඇතුළත් කරන්න!");
            }

            activeEmail = email;
            localStorage.setItem('squad_cloud_user', activeEmail);
            document.getElementById('userDisplayBadg').innerText = activeEmail;
            
            let userDocRef = db.collection('cloud_users').doc(btoa(activeEmail));
            userDocRef.get().then(doc => {
                if(!doc.exists) {
                    userDocRef.set({ points: 0, sessions: 0, history: [] }).then(() => {
                        loadDataFromCloud(activeEmail);
                    });
                } else {
                    loadDataFromCloud(activeEmail);
                }
            }).catch(err => alert("Error connecting to cloud: " + err.message + "\n\nTip: Make sure your Firestore Rules are set to public/true."));
        }

        function executeLogout() {
            if(isRunning) { clearInterval(countdown); isRunning = false; }
            localStorage.removeItem('squad_cloud_user');
            activeEmail = "";
            document.getElementById('authEmail').value = "";
            showAuthScreen();
        }

        // --- REALTIME SYNC ---
        function loadDataFromCloud(email) {
            db.collection('cloud_users').doc(btoa(email)).onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    if(!userData.history) userData.history = [];
                    updateUI();
                    showDashboard();
                }
            }, err => {
                alert("Cloud Sync Error: " + err.message);
            });
        }

        function saveDataToCloud() {
            if(activeEmail) {
                db.collection('cloud_users').doc(btoa(activeEmail)).set(userData);
            }
        }

        // --- TIMER & UI INTERFACES ---
        function showDashboard() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
        }

        function showAuthScreen() {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainDashboard').style.display = 'none';
        }

        function updateCustomTimes() {
            if(isRunning) return;
            focusTime = parseInt(document.getElementById('customFocus').value) * 60;
            breakTime = parseInt(document.getElementById('customBreak').value) * 60;
            timeLeft = (currentMode === 'focus') ? focusTime : breakTime;
            displayTime();
        }

        function setMode(mode) {
            if(isRunning) return;
            currentMode = mode;
            document.getElementById('focusModeBtn').classList.toggle('active', mode === 'focus');
            document.getElementById('breakModeBtn').classList.toggle('active', mode === 'break');
            timeLeft = (mode === 'focus') ? focusTime : breakTime;
            displayTime();
            document.getElementById('timerBtn').innerText = "Start Session";
        }

        function displayTime() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            if (isRunning) {
                clearInterval(countdown);
                isRunning = false;
                btn.innerText = "Resume";
            } else {
                isRunning = true;
                btn.innerText = "Pause";
                countdown = setInterval(() => {
                    timeLeft--;
                    displayTime();
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        isRunning = false;
                        sessionCompleted();
                    }
                }, 1000);
            }
        }

        function sessionCompleted() {
            let currentTask = document.getElementById('taskTopic').value.trim() || "General Study";
            let now = new Date();
            let timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (currentMode === 'focus') {
                userData.points += 100;
                userData.sessions += 1;
                userData.history.unshift({ task: currentTask, type: "Focus", time: timeString });
                alert("🎉 Focus Session එක අවසන්! +100 Points!");
                setMode('break');
            } else {
                userData.points += 20;
                userData.history.unshift({ task: "Short Break", type: "Break", time: timeString });
                alert("🥤 විවේකය අවසන්! නැවත වැඩ පටන් ගමු.");
                setMode('focus');
            }
            saveDataToCloud();
        }

        function updateUI() {
            document.getElementById('pointsDisplay').innerText = userData.points;
            document.getElementById('sessionsDisplay').innerText = userData.sessions;
            
            const listContainer = document.getElementById('historyList');
            if(userData.history.length === 0) {
                listContainer.innerHTML = `<li style="font-size: 0.8em; color: var(--text-muted); text-align: center; padding-top: 5px;">තවම Sessions කර නැත.</li>`;
            } else {
                listContainer.innerHTML = userData.history.map(item => {
                    let badgeColor = item.type === "Focus" ? "var(--accent-teal)" : "var(--accent-pink)";
                    return `<li class="history-item"><span><b style="color:${badgeColor}">[${item.type}]</b> ${item.task}</span><span>${item.time}</span></li>`;
                }).join('');
            }
            displayTime();
        }

        function askAIForPlan() {
            const topic = document.getElementById('taskTopic').value;
            if(!topic.trim()) return alert("කරුණාකර වැඩේ නම ලියන්න!");
            let totalMin = Math.floor(focusTime / 60);
            let t1 = Math.floor(totalMin * 0.4), t2 = Math.floor(totalMin * 0.4), t3 = totalMin - (t1 + t2);
            document.getElementById('aiSteps').innerHTML = `• 🌌 <b>විනාඩි ${t1}:</b> න්‍යාය කරුණු කියවන්න.<br>• 📝 <b>විනාඩි ${t2}:</b> Points මතකයෙන් ලියන්න.<br>• 🎯 <b>විනාඩි ${t3}:</b> ගැටලු විසඳන්න.`;
            document.getElementById('aiOutput').style.display = "block";
        }
    </script>
</body>
</html>
